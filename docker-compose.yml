version: "3.9"

services:
  lightline-node:
    build: .
    restart: unless-stopped
    ports:
      - "${NODE_PORT:-9090}:9090"
      - "${SS_PORT:-8388}:8388"
    volumes:
      - nodedata:/var/lib/lightline-node
      - ssconfig:/etc/shadowsocks
    env_file:
      - .env

volumes:
  nodedata:
  ssconfig:
